volumes:
  etc_wireguard:

services:
  wg-easy:
    environment:
      - PORT=80
      - HOST=0.0.0.0
      - INSECURE=false
      - DISABLE_IPV6=true
      - INIT_ENABLED=true
      - INIT_USERNAME=${ADMIN_USERNAME:-}
      - INIT_PASSWORD=${ADMIN_PASSWORD:-}
      - INIT_HOST=${VPN_SERVER_ADDRESS:-}
      - INIT_PORT=${VPN_SERVER_PORT:-}
      - INIT_DNS=1.1.1.1,8.8.8.8
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    networks:
      wg:
      caddy_net:
    volumes:
      - etc_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - "${VPN_SERVER_PORT:-}:${VPN_SERVER_PORT:-}/udp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
networks:
  caddy_net:
    external: true
  wg:
    external: true